services:
  api:
    build:
      context: api
      additional_contexts:
      - config=config
    container_name: lucos_configy
    ports:
      - $PORT:$PORT
    environment:
      - PORT
    image: lucas42/lucos_configy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always
